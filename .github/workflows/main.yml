name: Deploy Backend

on:
  push:
    branches: ['main']

jobs:
  deploy:
    runs-on: self-hosted # ← utiliser ton runner self-hosted
    steps:
      # 1️⃣ Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Installer pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      # 3️⃣ Build et déploiement
      - name: Build & Deploy Backend
        run: |
          cd /home/safidy/mnp-webmapping/backend
          git fetch
          git reset --hard origin/main
          pnpm install
          pnpm run migration:run
          pnpm run build
          pm2 reload webmap-backend
          echo "Backend déployé avec succès ! 🚀"
